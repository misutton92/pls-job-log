<style>
  :root{
    --paper:#E7E5DD;
    --paper-dark:#DAD7CC;
    --ink:#23262B;
    --ink-soft:#5B5F66;
    --orange:#FF6A13;
    --orange-dark:#C7500A;
    --yellow:#F2B705;
    --green:#3A7D44;
    --red:#C1401F;
    --line:#B9B6AC;
    --card:#F3F1EA;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper-dark);
    font-family: 'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace;
    color:var(--ink);
    padding:20px 12px 60px;
  }
  .ticket{
    max-width:720px;
    margin:0 auto;
    background:var(--paper);
    border:1px solid var(--line);
    box-shadow:0 2px 0 var(--line), 0 6px 18px rgba(0,0,0,0.15);
  }
  .head{
    background:var(--ink);
    color:var(--paper);
    padding:18px 20px 14px;
    position:relative;
    overflow:hidden;
  }
  .head::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:6px;
    background:repeating-linear-gradient(45deg,var(--orange) 0 10px,var(--ink) 10px 20px);
  }
  .head h1{
    font-family: Impact, 'Arial Narrow', sans-serif;
    font-weight:400;
    letter-spacing:1px;
    font-size:26px;
    margin:0 0 2px;
    text-transform:uppercase;
  }
  .head .sub{
    font-size:11px;
    color:#B9B6AC;
    text-transform:uppercase;
    letter-spacing:2px;
  }
  .perf{
    display:flex;
    justify-content:space-between;
    padding:0 14px;
    background:var(--paper);
    height:14px;
    align-items:center;
  }
  .perf span{
    width:8px;height:8px;border-radius:50%;
    background:var(--paper-dark);
    box-shadow:inset 0 0 0 1px var(--line);
  }
  .body{ padding:18px 20px 24px; }
  .row{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .field{ flex:1; min-width:140px; }
  label{
    display:block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--ink-soft);
    margin-bottom:4px;
    font-family: Arial, sans-serif;
    font-weight:700;
  }
  input[type=text], input[type=date], textarea, select{
    width:100%;
    border:1px solid var(--line);
    background:var(--card);
    padding:8px 9px;
    font-family:inherit;
    font-size:13px;
    color:var(--ink);
    border-radius:2px;
    -webkit-appearance:none;
    appearance:none;
  }
  textarea{resize:vertical; min-height:60px;}
  .job-info{
    background:var(--card);
    border:1px dashed var(--line);
    border-radius:2px;
    padding:10px 12px;
    margin-bottom:14px;
    font-size:12px;
    display:none;
  }
  .job-info.show{ display:block; }
  .job-info .jrow{ display:flex; justify-content:space-between; padding:2px 0; }
  .job-info .jlabel{ color:var(--ink-soft); text-transform:uppercase; font-size:10px; letter-spacing:1px; font-family:Arial,sans-serif;}
  .weather-strip{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--ink);
    color:var(--paper);
    padding:12px 14px;
    border-radius:3px;
    margin-bottom:16px;
    flex-wrap:wrap;

    font-family: Impact, sans-serif;
    font-size:34px;
    color:var(--orange);

  .weather-strip .loc{ font-size:11px; color:#B9B6AC; margin-top:2px;}

    background:var(--orange);

    border:none;
    padding:8px 14px;
    font-family: Arial, sans-serif;
    font-weight:700;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    cursor:pointer;
    border-radius:2px;

  .btn.ghost{ background:transparent; color:var(--ink); box-shadow:inset 0 0 0 1px var(--line);}
  .btn.small{ padding:5px 9px; font-size:10px;}
  .section-title{
    font-family: Impact, 'Arial Narrow', sans-serif;
    font-size:16px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin:22px 0 8px;
    display:flex;
    align-items:center;

  .section-title::before{
    content:"";

    background:var(--orange);

  .task-row, .prob-row{

    gap:8px;

  .task-row span.tlabel{ flex:1; font-size:13px; padding-top:2px;}

  .prob-row .tag{
    display:inline-block;
    font-size:9px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
    padding:2px 6px;
    border-radius:2px;
    margin-bottom:4px;
    width:fit-content;
    font-family:Arial,sans-serif;

  .tag.open{ background:var(--red); color:#fff; }
  .tag.resolved{ background:var(--green); color:#fff; }
  .prob-row .ptext{ font-size:13px; margin-bottom:4px;}
  .prob-row .sol{ font-size:12px; color:var(--ink-soft); border-left:2px solid var(--green); padding-left:8px;}
  .del{ background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:14px; }

  .history{

<script>
// ---------- Job list (mirrors 03 Active Jobs in the PLS vault, as of 2026-07-12) ----------
// Phase 2: replace this static list with a live read of the Drive folder.
// ---------- Google Drive Auth ----------
const CLIENT_ID = '97797932296-brgolmj9u4tp406c3kvmuj44l6ou0pul.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive';
const VAULT_ROOT_ID = '1yCvQNdd1oRagE0zJHzZ-SPNo8wI_tZsq';
const ACTIVE_JOBS_ID = '1ium-tWWviUjBmCYFyIeWzrDzppgD3xWA';
let accessToken = null;
let tokenClient = null;
let centralLogsFolderId = null;

function setAuthStatus(signedIn, text){
  const banner = document.getElementById('authBanner');
  const btn = document.getElementById('signInBtn');
  document.getElementById('authStatusText').textContent = text;
  if(signedIn){
    banner.classList.add('signed-in');
    btn.textContent = 'Signed in';
    btn.disabled = true;
  } else {
    banner.classList.remove('signed-in');
    btn.textContent = 'Sign in with Google';
    btn.disabled = false;
  }
}

function initGoogleAuth(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: (resp) => {
      if(resp && resp.access_token){
        accessToken = resp.access_token;
        setAuthStatus(true, 'Signed in — logs save to the PLS vault');
        refreshJobsFromDrive();
        // Sign-in often finishes after the page's initial load — if a job/foreman
        // is already selected, re-check the vault now for today's existing entry.
        const currentJob = document.getElementById('jobSelect').value;
        if(currentJob) handleJobSwitch(currentJob);
      } else {
        setAuthStatus(false, 'Sign-in failed — tap to retry');
      }
    }
  });
  // Try a silent sign-in first (works if this browser already has an active
  // Google session and previously granted access). Falls back to the button.
  tokenClient.requestAccessToken({ prompt: '' });
}

document.getElementById('signInBtn').addEventListener('click', () => {
  if(tokenClient){ tokenClient.requestAccessToken({ prompt: 'consent' }); }
});

window.addEventListener('load', () => {
  // google script loads async — wait briefly for it if needed
  const tryInit = () => {
    if(window.google && window.google.accounts){ initGoogleAuth(); }
    else { setTimeout(tryInit, 300); }
  };
  tryInit();
});

async function driveFetch(url, options = {}){
  if(!accessToken) throw new Error('Not signed in to Google Drive yet.');
  options.headers = Object.assign({}, options.headers, { 'Authorization': 'Bearer ' + accessToken });
  const res = await fetch(url, options);
  if(!res.ok){
    const errText = await res.text();
    throw new Error('Drive API error ' + res.status + ': ' + errText.slice(0,200));
  }
  return res.json();
}

async function findFolder(name, parentId){
  const q = encodeURIComponent(`'${parentId}' in parents and name = '${name.replace(/'/g,"\\'")}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`);
  const data = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  return (data.files && data.files[0]) ? data.files[0].id : null;
}

async function createFolder(name, parentId){
  const data = await driveFetch('https://www.googleapis.com/drive/v3/files?fields=id', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return data.id;
}

async function findOrCreateFolder(name, parentId){
  const existing = await findFolder(name, parentId);
  if(existing) return existing;
  return await createFolder(name, parentId);
}

async function createFileInFolder(name, parentId, content, mimeType = 'text/markdown'){
  const metadata = { name, parents: [parentId], mimeType };
  const boundary = '-------plsjoblog' + Date.now();
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: ${mimeType}\r\n\r\n${content}\r\n` +
    `--${boundary}--`;
  return await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST',
    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
    body
  });
}

async function findFileInFolder(name, parentId){
  const q = encodeURIComponent(`'${parentId}' in parents and name = '${name.replace(/'/g,"\\'")}' and trashed = false`);
  const data = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  return (data.files && data.files[0]) ? data.files[0].id : null;
}

async function updateFileContent(fileId, content, mimeType = 'text/markdown'){
  return await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { 'Content-Type': mimeType },
    body: content
  });
}

async function readFileContent(fileId){
  if(!accessToken) throw new Error('Not signed in to Google Drive yet.');
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { 'Authorization': 'Bearer ' + accessToken }
  });
  if(!res.ok) throw new Error('Drive read error ' + res.status);
  return res.text();
}

// Create-or-overwrite: one file per job per day, no matter how many times it's saved.
async function saveOrUpdateFile(name, parentId, content, mimeType = 'text/markdown'){
  const existingId = await findFileInFolder(name, parentId);
  if(existingId){
    await updateFileContent(existingId, content, mimeType);
    return existingId;
  }
  const created = await createFileInFolder(name, parentId, content, mimeType);
  return created.id;
}

async function getCentralLogsFolder(){
  if(centralLogsFolderId) return centralLogsFolderId;
  centralLogsFolderId = await findOrCreateFolder('04 Foreman Daily Logs', VAULT_ROOT_ID);
  return centralLogsFolderId;
}


async function createNewJobSkeleton(jobName){
  const jobFolderId = await createFolder(jobName, ACTIVE_JOBS_ID);
  await createFileInFolder('00 Project Home.md', jobFolderId,
    `# ${jobName} | Project Home\n\n## Project Status\n- **Status:** Active Job — new, created from field entry ${todayStr()}\n- Needs full detail pass — this was auto-created from the daily log app, not from the PO tracking sheet.\n\n## Open Items — Action Required Now\n- [ ] Fill in PO#, GC, owner, location, and contacts\n`);
  await createFileInFolder('01 Project Command Sheet.md', jobFolderId,
    `# 01 Project Command Sheet\n\n## Current Priority\n1. Fill in real project info — this job was created in the field via the daily log app and has no confirmed details yet.\n`);
  const logsId = await createFolder('08 Job Logs', jobFolderId);
  return { jobFolderId, logsId };
}

const JOBS = [
  { name:"26010 - McGill Park Phase 2", po:"26010", gc:"Tucson, Inc.", owner:"City of Canal Winchester", loc:"Canal Winchester, OH" },
  { name:"25005 - Wooster-Sterling Wastewater", po:"25005", gc:"Tucson, Inc.", owner:"Wayne Co. Board of Commissioners", loc:"Sterling, OH" },
  { name:"25017 - Coshocton Warsaw Booster", po:"25017", gc:"Tucson, Inc.", owner:"City of Coshocton", loc:"Coshocton, OH" },
  { name:"25-105-13 - Warsaw-Riverview Water Tower", po:"25-105-13", gc:"Tucson, Inc.", owner:"City of Coshocton", loc:"Coshocton, OH" },
  { name:"25019 - Caldwell Raw Water Dosing Station", po:"25019", gc:"Dunlap", owner:"Village of Caldwell", loc:"Caldwell, OH" },
  { name:"26020 - Union Williams Waverly", po:"26020", gc:"Dunlap", owner:"Union Williams PSD", loc:"Waverly, WV" },
  { name:"26015 - Chaseville Tank", po:"26015", gc:"Dunlap", owner:"Noble County Water Authority", loc:"Buffalo Township, OH" },
  { name:"26003 - Valley Falls Water System Improvements", po:"26003", gc:"RDR", owner:"Valley Falls PSD", loc:"Marion County, WV" },
  { name:"26013 - Meigs HS Wet Well Electric Service", po:"26013", gc:"RDR", owner:"Village of Pomeroy", loc:"Pomeroy, Meigs County, OH" },
  { name:"26021 - Woodsfield Backwash System Improvements", po:"26021", gc:"RDR", owner:"Village of Woodsfield", loc:"Monroe County, OH" },
  { name:"26006 - Highland Ridge Waterline Extensions", po:"26006", gc:"RDR", owner:"Highland Ridge Water Association", loc:"Lowell, OH" },
  { name:"25026 - Jackson County Water Phase 8B", po:"25026", gc:"Little Creek", owner:"Jackson County Water Co.", loc:"Jackson & Vinton Counties, OH" },
  { name:"25032 - Pomeroy SR 833 Sewer Extensions Ph III", po:"25032", gc:"RDR", owner:"Village of Pomeroy", loc:"Meigs County, OH — S.R. 833" }
];

let customJobs = [];
let tasks = [];
let problems = [];
let coords = null;

function todayStr(){ return new Date().toISOString().slice(0,10); }
document.getElementById('logDate').value = todayStr();

function populateJobs(){
  const sel = document.getElementById('jobSelect');
  sel.innerHTML = '<option value="">Select a job...</option>';
  [...JOBS, ...customJobs].forEach(j => {
    const opt = document.createElement('option');
    opt.value = j.name;
    opt.textContent = j.loc && j.loc !== 'TBD' ? `${j.name} — ${j.loc}` : j.name;
    sel.appendChild(opt);
  });
}
populateJobs();

// ---------- Live job list from Drive (falls back to the static list above) ----------
const JOBS_CACHE_KEY = 'vault_jobs_cache_v1';

function loadCachedJobs(){
  try{
    const cached = JSON.parse(localStorage.getItem(JOBS_CACHE_KEY));
    if(cached && Array.isArray(cached.jobs) && cached.jobs.length){
      JOBS.length = 0;
      cached.jobs.forEach(j => JOBS.push(j));
      populateJobs();
      const status = document.getElementById('statusMsg');
      if(status) status.textContent = `Job list loaded from cache (last synced ${new Date(cached.syncedAt).toLocaleString()}).`;
    }
  }catch(e){ /* non-fatal, static list stays as-is */ }
}

async function refreshJobsFromDrive(){
  const status = document.getElementById('statusMsg');
  if(!accessToken) return;
  status.textContent = 'Checking 03 Active Jobs in the vault for updates...';
  try{
    const q = encodeURIComponent(`'${ACTIVE_JOBS_ID}' in parents and mimeType = 'application/vnd.google-apps.folder' and trashed = false`);
    const data = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=200&orderBy=name`);
    const folders = data.files || [];
    if(folders.length === 0) return; // don't wipe the list on an empty/failed response

    // Keep known details (po/gc/owner/loc) for jobs we already recognize;
    // new folders show up with placeholders until someone fills in 00 Project Home.
    const existingByName = {};
    JOBS.forEach(j => existingByName[j.name] = j);

    const freshList = folders.map(f => {
      const known = existingByName[f.name];
      return known || { name: f.name, po:'—', gc:'—', owner:'—', loc:'TBD' };
    });

    JOBS.length = 0;
    freshList.forEach(j => JOBS.push(j));
    populateJobs();

    try{
      localStorage.setItem(JOBS_CACHE_KEY, JSON.stringify({ jobs: freshList, syncedAt: new Date().toISOString() }));
    }catch(e){ /* non-fatal */ }

    status.textContent = `Job list synced from the vault — ${freshList.length} active jobs found.`;
  }catch(err){
    status.textContent = 'Could not refresh job list from vault: ' + err.message;
  }
}

loadCachedJobs();

// ---------- Draft autosave (survives closing the app / switching jobs before Save) ----------
// Keyed per job so switching jobs never wipes out other in-progress work.
let currentDraftJob = '';

function draftKeyFor(job){
  return 'joblog_draft_v1:' + (job || '__no_job__');
}

function saveDraft(){
  const job = document.getElementById('jobSelect').value;
  const draft = {
    date: document.getElementById('logDate').value,
    foreman: document.getElementById('foreman').value,
    job,
    crewNotes: document.getElementById('crewNotes').value,
    tasks, problems,
    weather: {
      temp: document.getElementById('wTemp').textContent,
      desc: document.getElementById('wDesc').textContent,
      loc: document.getElementById('wLoc').textContent
    },
    coords,
    existingFileFound: !!currentEntryExists
  };
  try{ localStorage.setItem(draftKeyFor(job || currentDraftJob), JSON.stringify(draft)); }catch(e){ /* non-fatal */ }
}

function clearDraft(job){
  try{ localStorage.removeItem(draftKeyFor(job)); }catch(e){ /* non-fatal */ }
}

function applyDraftToForm(draft){
  if(!draft) return false;
  if(draft.date) document.getElementById('logDate').value = draft.date;
  if(draft.foreman) document.getElementById('foreman').value = draft.foreman;
  if(draft.crewNotes) document.getElementById('crewNotes').value = draft.crewNotes;
  if(draft.weather){
    document.getElementById('wTemp').textContent = draft.weather.temp || '--°';
    document.getElementById('wDesc').textContent = draft.weather.desc || 'No weather yet';
    document.getElementById('wLoc').textContent = draft.weather.loc || 'Location not set';
  }
  coords = draft.coords || null;
  tasks = draft.tasks || [];
  problems = draft.problems || [];
  renderTasks();
  renderProblems();
  return !!(draft.crewNotes || tasks.length || problems.length);
}

function restoreDraft(){
  // On first load, reopen whatever job was last open — same logic as switching jobs,
  // so if it was already saved to the vault today, we pull the real thing, not a stale local copy.
  let lastJobKey;
  try{ lastJobKey = localStorage.getItem('joblog_last_job_v1'); }catch(e){ lastJobKey = null; }
  if(!lastJobKey) return;
  document.getElementById('jobSelect').value = lastJobKey;
  handleJobSwitch(lastJobKey);
}

// Autosave on any change to the main fields.
['logDate','foreman','crewNotes'].forEach(id => {
  document.getElementById(id).addEventListener('input', saveDraft);
  document.getElementById(id).addEventListener('change', saveDraft);
});

// When switching jobs: save the outgoing job's draft, then either reopen
// today's already-saved vault entry for the new job, restore its local
// draft, or start blank — never silently lose whatever was in progress.
let currentEntryExists = null; // fileId of an existing today's log for the current job, if any

async function handleJobSwitch(newJobName){
  // Save whatever was on screen under the OLD job before switching away.
  if(currentDraftJob){
    saveDraft();
  }
  currentDraftJob = newJobName;
  try{ localStorage.setItem('joblog_last_job_v1', newJobName); }catch(e){ /* non-fatal */ }
  currentEntryExists = null;

  const job = [...JOBS, ...customJobs].find(j => j.name === newJobName);
  showJobInfo(job);

  const status = document.getElementById('statusMsg');
  const date = document.getElementById('logDate').value || todayStr();
  const foreman = document.getElementById('foreman').value;

  // Reset the entry-specific fields before loading whatever's appropriate.
  document.getElementById('crewNotes').value = '';
  document.getElementById('wTemp').textContent = '--°';
  document.getElementById('wDesc').textContent = 'No weather yet';
  document.getElementById('wLoc').textContent = 'Location not set';
  coords = null;
  tasks = [];
  problems = [];

  // 1) If signed in and a foreman's picked, check the vault for an entry
  //    already saved today for this job — reopen it instead of starting over.
  if(accessToken && foreman && newJobName){
    status.textContent = 'Checking the vault for an existing log today...';
    try{
      const jobFolderId = await findFolder(newJobName, ACTIVE_JOBS_ID);
      if(jobFolderId){
        const perJobLogsId = await findOrCreateFolder('08 Job Logs', jobFolderId);
        const fname = `${date}_${foreman}.md`;
        const existingId = await findFileInFolder(fname, perJobLogsId);
        if(existingId){
          const content = await readFileContent(existingId);
          const parsed = parseLogMarkdown(content);
          if(parsed){
            applyDraftToForm(parsed);
            currentEntryExists = existingId;
            status.textContent = `Reopened today's existing log for ${newJobName} — edit and Save to update it.`;
            return;
          }
        }
      }
    }catch(err){
      // fall through to local draft / blank — don't block the foreman over a network hiccup
    }
  }

  // 2) No existing vault entry (or not signed in yet) — fall back to a local draft for this job.
  let draft;
  try{ draft = JSON.parse(localStorage.getItem(draftKeyFor(newJobName))); }catch(e){ draft = null; }
  const hadContent = applyDraftToForm(draft);
  if(hadContent){
    status.textContent = 'Restored your unsaved entry for this job from earlier — keep going or Save when ready.';
  } else {
    status.textContent = newJobName ? `Starting a fresh entry for ${newJobName}.` : '';
  }
  renderTasks();
  renderProblems();
}

restoreDraft();

document.getElementById('toggleNewJob').addEventListener('click', () => {
  document.getElementById('newJobRow').classList.toggle('show');
});

document.getElementById('refreshJobsBtn').addEventListener('click', () => {
  if(!accessToken){
    document.getElementById('statusMsg').textContent = 'Sign in with Google first to sync the job list from the vault.';
    return;
  }
  refreshJobsFromDrive();
});

document.getElementById('addJobBtn').addEventListener('click', async () => {
  const name = document.getElementById('newJobName').value.trim();
  if(!name) return;
  const newJob = { name, po:'TBD', gc:'TBD', owner:'TBD', loc:'TBD' };

  document.getElementById('newJobName').value = '';
  document.getElementById('newJobRow').classList.remove('show');

  const status = document.getElementById('statusMsg');

    status.textContent = 'New job added locally — sign in with Google to create it in the vault too.';
    return;
  }
  status.textContent = 'Creating job folder in the vault...';

    await createNewJobSkeleton(name);

  }catch(err){

function showJobInfo(job){
  const box = document.getElementById('jobInfo');
  if(!job){ box.classList.remove('show'); return; }
  document.getElementById('jiPO').textContent = job.po;
  document.getElementById('jiGC').textContent = job.gc;
  document.getElementById('jiOwner').textContent = job.owner;
  document.getElementById('jiLoc').textContent = job.loc;
  box.classList.add('show');
}

document.getElementById('jobSelect').addEventListener('change', e => {
  handleJobSwitch(e.target.value);
});

// ---------- Tasks ----------
function renderTasks(){
  const list = document.getElementById('taskList');
  list.innerHTML = '';
  if(typeof saveDraft === 'function') saveDraft();
  if(tasks.length === 0){

    list.innerHTML = '<div class="empty">No tasks yet.</div>';
    return;
  }
  tasks.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'task-row' + (t.done ? ' done' : '');
    row.innerHTML = `
      <input type="checkbox" ${t.done ? 'checked' : ''} data-i="${i}" class="taskChk">
      <span class="tlabel">${escapeHtml(t.text)}</span>
      <button class="del" data-i="${i}" title="Remove">✕</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.taskChk').forEach(cb => {
    cb.addEventListener('change', e => {
      tasks[+e.target.dataset.i].done = e.target.checked;
      renderTasks();
    });
  });
  list.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', e => {
      tasks.splice(+e.target.dataset.i, 1);
      renderTasks();
    });
  });
}
document.getElementById('addTaskBtn').addEventListener('click', () => {
  const input = document.getElementById('newTask');
  if(input.value.trim() === '') return;
  tasks.push({text: input.value.trim(), done:false});
  input.value = '';
  renderTasks();
});
document.getElementById('newTask').addEventListener('keydown', e => {
  if(e.key === 'Enter'){ document.getElementById('addTaskBtn').click(); }
});

// ---------- Problems ----------
function renderProblems(){
  const list = document.getElementById('probList');
  list.innerHTML = '';
  if(typeof saveDraft === 'function') saveDraft();
  if(problems.length === 0){
    list.innerHTML = '<div class="empty">No issues logged.</div>';
    return;
  }
  problems.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'prob-row';
    const resolved = p.solution && p.solution.trim() !== '';
    row.innerHTML = `
      <div style="display:flex; justify-content:space-between; width:100%;">
        <span class="tag ${resolved ? 'resolved' : 'open'}">${resolved ? 'Resolved' : 'Open'}</span>
        <button class="del" data-i="${i}" title="Remove">✕</button>
      </div>
      <div class="ptext">${escapeHtml(p.problem)}</div>
      ${resolved ? `<div class="sol">${escapeHtml(p.solution)}</div>` : ''}
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', e => {
      problems.splice(+e.target.dataset.i, 1);
      renderProblems();
    });
  });
}
document.getElementById('addProbBtn').addEventListener('click', () => {
  const pInput = document.getElementById('newProblem');
  const sInput = document.getElementById('newSolution');
  if(pInput.value.trim() === '') return;
  problems.push({problem: pInput.value.trim(), solution: sInput.value.trim()});
  pInput.value = '';
  sInput.value = '';
  renderProblems();
});

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ---------- Weather / Location ----------
function weatherCodeToText(code){
  const map = {
    0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
    45:'Fog',48:'Rime fog',
    51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
    61:'Light rain',63:'Rain',65:'Heavy rain',
    71:'Light snow',73:'Snow',75:'Heavy snow',
    80:'Rain showers',81:'Rain showers',82:'Violent showers',
    95:'Thunderstorm',96:'Thunderstorm w/ hail',99:'Severe thunderstorm'
  };
  return map[code] || 'Unknown conditions';
}
document.getElementById('pullWeatherBtn').addEventListener('click', () => {
  const status = document.getElementById('statusMsg');
  if(!navigator.geolocation){
    status.textContent = 'Geolocation not supported by this browser.';
    return;
  }
  status.textContent = 'Getting location...';
  navigator.geolocation.getCurrentPosition(async (pos) => {
    coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
    document.getElementById('wLoc').textContent = `${coords.lat.toFixed(3)}, ${coords.lon.toFixed(3)}`;
    status.textContent = 'Pulling weather...';
    try{
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current_weather=true&temperature_unit=fahrenheit&windspeed_unit=mph`);
      const data = await res.json();
      const cw = data.current_weather;
      document.getElementById('wTemp').textContent = Math.round(cw.temperature) + '°F';
      document.getElementById('wDesc').textContent = weatherCodeToText(cw.weathercode) + ' · Wind ' + Math.round(cw.windspeed) + ' mph';
      status.textContent = 'Weather updated ' + new Date().toLocaleTimeString();
    }catch(err){
      status.textContent = 'Weather pull failed — check connection.';
    }
  }, (err) => {
    status.textContent = 'Location blocked or unavailable: ' + err.message;
  }, {enableHighAccuracy:true, timeout:10000});
});

// ---------- Save / Storage (Phase 1: window.storage stand-in for Drive) ----------
function entryToMarkdown(entry){
  const doneTasks = entry.tasks.filter(t => t.done).map(t => `- [x] ${t.text}`).join('\n');
  const openTasks = entry.tasks.filter(t => !t.done).map(t => `- [ ] ${t.text}`).join('\n');
  const probs = entry.problems.map(p => {
    const resolved = p.solution && p.solution.trim() !== '';
    return `**${resolved ? 'Resolved' : 'Open'}:** ${p.problem}` + (resolved ? `\n> Solution: ${p.solution}` : '');
  }).join('\n\n');
  const dataBlock = JSON.stringify({
    date: entry.date, foreman: entry.foreman, job: entry.job,
    weather: entry.weather, crewNotes: entry.crewNotes,
    tasks: entry.tasks, problems: entry.problems
  });
  return `# Daily Log — ${entry.date} — ${entry.foreman}\n\n` +
    `**Job:** ${entry.job}\n` +
    `**Weather:** ${entry.weather.temp} — ${entry.weather.desc}\n` +
    `**Location:** ${entry.weather.loc}\n\n` +
    `## Crew Notes\n${entry.crewNotes || '_none logged_'}\n\n` +
    `## Tasks\n${openTasks || '_none open_'}\n${doneTasks}\n\n` +
    `## Problems & Solutions\n${probs || '_none logged_'}\n\n` +
    `---\n*Last updated ${entry.savedAt}*\n` +
    `<!-- LOGDATA:${dataBlock} -->\n`;
}

function parseLogMarkdown(md){
  const match = md.match(/<!-- LOGDATA:(.*?) -->/s);
  if(!match) return null;
  try{ return JSON.parse(match[1]); }catch(e){ return null; }
}

async function saveLog(){
  const status = document.getElementById('statusMsg');
  const date = document.getElementById('logDate').value || todayStr();
  const foreman = document.getElementById('foreman').value;
  const job = document.getElementById('jobSelect').value;
  if(!foreman){ status.textContent = 'Select a foreman before saving.'; return; }
  if(!job){ status.textContent = 'Select a job before saving.'; return; }

  const entry = {
    date, foreman, job,
    weather: {
      temp: document.getElementById('wTemp').textContent,
      desc: document.getElementById('wDesc').textContent,
      loc: document.getElementById('wLoc').textContent,
      coords
    },
    crewNotes: document.getElementById('crewNotes').value,
    tasks, problems,
    savedAt: new Date().toISOString()
  };

  // Always keep a local cache so "Past Logs" works even offline.
  const key = `joblog:${date}_${foreman}_${job}`.replace(/\s+/g,'_');
  try{ localStorage.setItem(key, JSON.stringify(entry)); }catch(e){ /* non-fatal */ }

  if(!accessToken){
    status.textContent = `Saved locally only — sign in with Google to write this into the PLS vault.`;
    clearDraft();
    loadHistory();
    return;
  }

  status.textContent = 'Saving to the PLS vault...';
  try{
    const md = entryToMarkdown(entry);
    const jobFolderId = await findFolder(job, ACTIVE_JOBS_ID);
    if(!jobFolderId) throw new Error(`Could not find "${job}" under 03 Active Jobs in Drive.`);
    const perJobLogsId = await findOrCreateFolder('08 Job Logs', jobFolderId);
    await saveOrUpdateFile(`${date}_${foreman}.md`, perJobLogsId, md);

    const centralId = await getCentralLogsFolder();
    await saveOrUpdateFile(`${date}_${foreman}_${job}.md`, centralId, md);

    status.textContent = `Saved to vault: ${job} — ${foreman} — ${date} (and to 04 Foreman Daily Logs). Save again anytime today to update this same entry.`;
    clearDraft(job);
  }catch(err){
    status.textContent = 'Saved locally, but vault write failed: ' + err.message + ' — your entry is still here, try Save again.';
  }
  loadHistory();
}
document.getElementById('saveBtn').addEventListener('click', saveLog);

function clearForm(){
  const outgoingJob = document.getElementById('jobSelect').value || currentDraftJob;
  document.getElementById('logDate').value = todayStr();
  document.getElementById('foreman').value = '';
  document.getElementById('jobSelect').value = '';
  document.getElementById('crewNotes').value = '';
  document.getElementById('wTemp').textContent = '--°';
  document.getElementById('wDesc').textContent = 'No weather yet';
  document.getElementById('wLoc').textContent = 'Location not set';
  showJobInfo(null);
  coords = null;
  tasks = [];
  problems = [];
  renderTasks();
  renderProblems();
  if(outgoingJob) clearDraft(outgoingJob);
  currentDraftJob = '';
  currentEntryExists = null;
  try{ localStorage.removeItem('joblog_last_job_v1'); }catch(e){ /* non-fatal */ }
  document.getElementById('statusMsg').textContent = 'Cleared. Ready for a new log.';
}
document.getElementById('newLogBtn').addEventListener('click', clearForm);

async function loadHistory(){
  const histDiv = document.getElementById('historyList');
  try{
    const keys = [];
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && k.startsWith('joblog:')) keys.push(k);
    }
    if(keys.length === 0){
      histDiv.innerHTML = '<div class="empty">No saved logs yet.</div>';
      return;
    }
    keys.sort().reverse();
    histDiv.innerHTML = '';
    for(const key of keys){
      const row = document.createElement('div');
      row.className = 'hist-item';
      const label = key.replace('joblog:', '').replace(/_/g, ' ');
      row.innerHTML = `<span>${label}</span>`;
      histDiv.appendChild(row);
    }
  }catch(err){
    histDiv.innerHTML = '<div class="empty">History unavailable.</div>';
  }
}

renderTasks();
renderProblems();
loadHistory();
</script>
